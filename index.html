<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>하천 DEM 분석 시스템</title>
<link rel="manifest" href="./manifest.webmanifest">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<style>
*{box-sizing:border-box}body{margin:0;background:#f3f4f6;font-family:Segoe UI,Malgun Gothic,sans-serif;color:#111827}.app{max-width:620px;margin:0 auto;padding-bottom:20px}.top{position:sticky;top:0;z-index:999;background:#f3f4f6ee;backdrop-filter:blur(12px);border-bottom:1px solid #e5e7eb;padding:16px}.title{font-size:24px;font-weight:900}.card{background:white;margin:14px;border:1px solid #e5e7eb;border-radius:24px;padding:18px;box-shadow:0 8px 22px #0001}h2{margin:0;font-size:21px}.desc{color:#6b7280;line-height:1.5;margin-top:8px;font-size:14px}input,button{width:100%;padding:15px;margin-top:10px;border-radius:18px;border:1px solid #d1d5db;font-size:16px;font-weight:800}button{background:#2563eb;color:white;border:none}.gray{background:#f3f4f6!important;color:#374151!important;border:1px solid #d1d5db!important}.green{background:#16a34a!important}.hidden{display:none}#map{height:58vh;min-height:400px;border-radius:22px;border:1px solid #d1d5db;margin-top:12px;overflow:hidden}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:18px;padding:14px;margin-top:10px}.label{color:#6b7280;font-size:14px;font-weight:800}.value{font-size:28px;font-weight:900;margin-top:6px}.log{background:#111827;color:#4ade80;border-radius:18px;padding:14px;margin-top:12px;font-family:Consolas,monospace;font-size:12px;white-space:pre-wrap;line-height:1.55;overflow:auto}.colorItem{display:grid;grid-template-columns:34px 1fr auto;gap:10px;align-items:center;background:#f9fafb;border:1px solid #e5e7eb;border-radius:16px;padding:10px;margin-top:8px}.colorItem.active{outline:3px solid #2563eb;background:#eff6ff}.swatch{width:34px;height:34px;border-radius:12px;border:1px solid #0002}.pill{font-size:12px;font-weight:900;background:#dbeafe;color:#1e3a8a;border-radius:999px;padding:6px 8px}.rangeRow{display:grid;grid-template-columns:1fr 70px;gap:10px;align-items:center;margin-top:10px}input[type=range]{padding:0}
</style>
</head>
<body>
<div class="app">
<header class="top"><div class="title">☰ 하천 DEM 분석 시스템</div></header>

<section class="card" id="start">
<h2>1. 시작 준비</h2>
<div class="desc">VWorld API Key와 GeoTIFF DEM을 선택합니다.</div>
<input id="key" placeholder="VWorld API Key">
<input type="file" id="demFile" accept=".tif,.tiff">
<button onclick="prepare()">API Key / DEM 적용</button>
<div class="log" id="info">DEM 대기 중</div>
</section>

<section class="card hidden" id="control">
<h2>2. 색상 표시 / 반투명 설정</h2>
<div class="desc">색상 구간을 누르면 해당 고도 구간만 강조됩니다.</div>
<div class="rangeRow"><input type="range" id="opacity" min="10" max="80" value="45" oninput="updateOpacity(); redrawIfOn();"><div class="pill" id="opacityText">45%</div></div>
<div id="legend"></div>
<button onclick="toggleHeat()">Heatmap 켜기 / 끄기</button>
<button class="gray" onclick="selectClass('all')">전체 색상 보기</button>
<button class="green" onclick="goHwagae()">화개 섬진강으로 이동</button>
</section>

<section class="card hidden" id="mapCard"><h2>3. 지도</h2><div class="desc">지도를 터치하면 DEM 고도와 3x3 검증값을 표시합니다.</div><div id="map"></div></section>

<section class="card hidden" id="resultCard">
<h2>4. 결과</h2>
<div class="grid"><div class="box"><div class="label">DEM 고도</div><div class="value" id="zText">-</div></div><div class="box"><div class="label">3x3 평균</div><div class="value" id="avgText">-</div></div></div>
<div class="grid"><div class="box"><div class="label">3x3 최소</div><div class="value" id="minText">-</div></div><div class="box"><div class="label">3x3 최대</div><div class="value" id="maxText">-</div></div></div>
<div class="log" id="result">지도 클릭 대기 중</div>
</section>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script>
<script>
proj4.defs("EPSG:5179","+proj=tmerc +lat_0=38 +lon_0=127.5 +k=0.9996 +x_0=1000000 +y_0=2000000 +ellps=GRS80 +units=m +no_defs");
const CLASSES=[{id:"a",label:"0~5m",sub:"강·수면·저지대",min:-99999,max:5,rgb:[0,0,255]},{id:"b",label:"5~20m",sub:"하천 주변 낮은 지형",min:5,max:20,rgb:[0,200,255]},{id:"c",label:"20~50m",sub:"둔치·평지",min:20,max:50,rgb:[0,255,0]},{id:"d",label:"50~100m",sub:"제방·사면",min:50,max:100,rgb:[255,255,0]},{id:"e",label:"100m+",sub:"산지·고지대",min:100,max:999999,rgb:[255,0,0]}];
let map,heat,marker,raster,width=0,height=0,originX=0,originY=0,pixelX=0,pixelY=0,minX=0,maxX=0,minY=0,maxY=0,key="",selected="all";
function init(){document.getElementById("key").value=localStorage.getItem("vworld_key")||"";renderLegend();updateOpacity()}init();
function renderLegend(){const el=document.getElementById("legend");el.innerHTML="";const all=document.createElement("div");all.className="colorItem active";all.id="lg-all";all.onclick=()=>selectClass("all");all.innerHTML='<div class="swatch" style="background:linear-gradient(135deg,blue,cyan,lime,yellow,red)"></div><div><b>전체</b><div class="desc">모든 고도 구간</div></div><div class="pill">선택</div>';el.appendChild(all);CLASSES.forEach(c=>{const d=document.createElement("div");d.className="colorItem";d.id="lg-"+c.id;d.onclick=()=>selectClass(c.id);d.innerHTML=`<div class="swatch" style="background:rgba(${c.rgb[0]},${c.rgb[1]},${c.rgb[2]},.8)"></div><div><b>${c.label}</b><div class="desc">${c.sub}</div></div><div class="pill">선택</div>`;el.appendChild(d)})}
function selectClass(id){selected=id;document.querySelectorAll(".colorItem").forEach(x=>x.classList.remove("active"));document.getElementById("lg-"+id).classList.add("active");redrawIfOn()}
function updateOpacity(){document.getElementById("opacityText").innerText=document.getElementById("opacity").value+"%"}
async function prepare(){key=document.getElementById("key").value.trim();if(!key){alert("VWorld API Key 입력");return}localStorage.setItem("vworld_key",key);const file=document.getElementById("demFile").files[0];if(!file){alert("GeoTIFF 선택");return}document.getElementById("info").innerText="DEM 로드 중...";const buf=await file.arrayBuffer();const tiff=await GeoTIFF.fromArrayBuffer(buf);const img=await tiff.getImage();width=img.getWidth();height=img.getHeight();const tie=img.getTiePoints()[0];const scale=img.getFileDirectory().ModelPixelScale;originX=tie.x;originY=tie.y;pixelX=scale[0];pixelY=-scale[1];minX=Math.min(originX,originX+pixelX*width);maxX=Math.max(originX,originX+pixelX*width);minY=Math.min(originY,originY+pixelY*height);maxY=Math.max(originY,originY+pixelY*height);const rs=await img.readRasters({samples:[0]});raster=rs[0];document.getElementById("info").innerText=`DEM 로드 성공\n크기=${width}x${height}\nX=${minX}~${maxX}\nY=${minY}~${maxY}`;["start"].forEach(id=>document.getElementById(id).classList.add("hidden"));["control","mapCard","resultCard"].forEach(id=>document.getElementById(id).classList.remove("hidden"));ensureMap([35.186645,127.622747],14)}
function ensureMap(center,zoom){if(!map){map=L.map("map",{zoomControl:false}).setView(center,zoom);L.tileLayer("https://api.vworld.kr/req/wmts/1.0.0/"+key+"/Base/{z}/{y}/{x}.png",{maxZoom:19,attribution:"VWorld"}).addTo(map);map.on("click",e=>{if(marker)marker.setLatLng(e.latlng);else marker=L.marker(e.latlng).addTo(map);showPoint(e.latlng.lat,e.latlng.lng)})}else map.setView(center,zoom);setTimeout(()=>map.invalidateSize(),300)}
function goHwagae(){ensureMap([35.186645,127.622747],14)}
function vAt(r,c){if(!raster||r<0||c<0||r>=height||c>=width)return null;const v=Number(raster[r*width+c]);return Number.isFinite(v)?v:null}
function stats3(r,c){let a=[];for(let y=r-1;y<=r+1;y++)for(let x=c-1;x<=c+1;x++){const v=vAt(y,x);if(v!==null)a.push(v)}if(!a.length)return null;return{avg:a.reduce((p,q)=>p+q,0)/a.length,min:Math.min(...a),max:Math.max(...a),count:a.length}}
function readDem(lat,lon){const p=proj4("EPSG:4326","EPSG:5179",[lon,lat]);const x=p[0],y=p[1];if(x<minX||x>=maxX||y<minY||y>=maxY)return{ok:false,msg:"DEM 범위 밖",x,y};const rawRow=(originY-y)/Math.abs(pixelY),rawCol=(x-originX)/pixelX;const row=Math.floor(rawRow),col=Math.floor(rawCol);const z=vAt(row,col),st=stats3(row,col);if(z===null||!st)return{ok:false,msg:"픽셀 오류",x,y,row,col};return{ok:true,z,st,x,y,row,col,rawRow,rawCol}}
function showPoint(lat,lon){const r=readDem(lat,lon);if(!r.ok){document.getElementById("zText").innerText="-";document.getElementById("avgText").innerText="-";document.getElementById("minText").innerText="-";document.getElementById("maxText").innerText="-";document.getElementById("result").innerText=`상태=${r.msg}\n위도=${lat.toFixed(7)}\n경도=${lon.toFixed(7)}\nX=${r.x?.toFixed(3)}\nY=${r.y?.toFixed(3)}`;return}document.getElementById("zText").innerText=r.z.toFixed(2)+"m";document.getElementById("avgText").innerText=r.st.avg.toFixed(2)+"m";document.getElementById("minText").innerText=r.st.min.toFixed(2)+"m";document.getElementById("maxText").innerText=r.st.max.toFixed(2)+"m";document.getElementById("result").innerText=`위도=${lat.toFixed(7)}\n경도=${lon.toFixed(7)}\nX=${r.x.toFixed(3)}\nY=${r.y.toFixed(3)}\nrow=${r.row}\ncol=${r.col}\n단일=${r.z.toFixed(5)}m\n3x3 평균=${r.st.avg.toFixed(5)}m\n3x3 최소=${r.st.min.toFixed(5)}m\n3x3 최대=${r.st.max.toFixed(5)}m\n선택 색상=${selected}`}
function cls(h){return CLASSES.find(c=>h>=c.min&&h<c.max)||CLASSES[CLASSES.length-1]}function rgba(h){const c=cls(h);const alpha=Math.round(parseInt(document.getElementById("opacity").value)/100*255);if(selected==="all"||selected===c.id)return[c.rgb[0],c.rgb[1],c.rgb[2],alpha];return[180,180,180,35]}
function toggleHeat(){if(!map||!raster){alert("DEM 먼저 로드");return}if(heat){map.removeLayer(heat);heat=null;return}drawHeat()}function redrawIfOn(){if(heat)drawHeat()}
function drawHeat(){if(heat){map.removeLayer(heat);heat=null}const canvas=document.createElement("canvas");canvas.width=width;canvas.height=height;const ctx=canvas.getContext("2d");const img=ctx.createImageData(width,height);for(let y=0;y<height;y++)for(let x=0;x<width;x++){const i=y*width+x;const c=rgba(Number(raster[i]));const p=i*4;img.data[p]=c[0];img.data[p+1]=c[1];img.data[p+2]=c[2];img.data[p+3]=c[3]}ctx.putImageData(img,0,0);function to4326(x,y){const p=proj4("EPSG:5179","EPSG:4326",[x,y]);return[p[1],p[0]]}const nw=to4326(minX,maxY),se=to4326(maxX,minY);const b=[[se[0],nw[1]],[nw[0],se[1]]];heat=L.imageOverlay(canvas.toDataURL(),b,{opacity:1}).addTo(map);map.fitBounds(b)}
</script>
</body>
</html>
