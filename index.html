<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>River DEM</title><link rel="manifest" href="./manifest.webmanifest"><link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"><style>
*{box-sizing:border-box}body{margin:0;background:#f3f4f6;color:#111827;font-family:Segoe UI,Malgun Gothic,sans-serif}.app{max-width:620px;margin:0 auto;padding-bottom:24px}.header{position:sticky;top:0;z-index:1000;background:#f3f4f6ee;backdrop-filter:blur(12px);border-bottom:1px solid #e5e7eb;padding:15px 16px;display:flex;justify-content:space-between;align-items:center}.title{font-size:26px;font-weight:900}.set{width:auto;margin:0;padding:10px 14px;border-radius:16px;background:#111827;color:#fff;border:0}.card{background:#fff;margin:14px;padding:18px;border:1px solid #e5e7eb;border-radius:26px;box-shadow:0 8px 22px #0001}h2{margin:0;font-size:22px}.desc{color:#6b7280;line-height:1.5;margin-top:8px;font-size:14px}input,button,select{width:100%;padding:16px;margin-top:10px;border-radius:20px;border:1px solid #d1d5db;font-size:16px;font-weight:800}button{background:#2563eb;color:#fff;border:0}.green{background:#16a34a}.gray{background:#f3f4f6;color:#374151;border:1px solid #d1d5db}.hidden{display:none}#map{height:58vh;min-height:390px;border-radius:22px;border:1px solid #d1d5db;margin-top:12px;overflow:hidden}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.box{background:#f9fafb;border:1px solid #e5e7eb;border-radius:18px;padding:14px;margin-top:10px}.label{color:#6b7280;font-size:14px;font-weight:800}.value{font-size:28px;font-weight:900;margin-top:6px}.state{font-size:20px;font-weight:900;margin-top:6px}.log{background:#111827;color:#4ade80;border-radius:18px;padding:14px;margin-top:12px;font-family:Consolas,monospace;font-size:12px;white-space:pre-wrap;line-height:1.55;overflow:auto}.badge{display:inline-block;margin-top:8px;background:#dbeafe;color:#1e3a8a;font-weight:900;border-radius:999px;padding:7px 10px;font-size:13px}.mask{display:none;position:fixed;inset:0;background:#0007;z-index:2000}.drawer{position:absolute;right:0;top:0;width:min(88vw,390px);height:100%;background:#fff;padding:18px;overflow:auto}.ci{display:grid;grid-template-columns:34px 1fr;gap:10px;align-items:center;background:#f9fafb;border:1px solid #e5e7eb;border-radius:16px;padding:10px;margin-top:8px}.ci.active{outline:3px solid #2563eb;background:#eff6ff}.sw{width:34px;height:34px;border-radius:12px;border:1px solid #0002}.rr{display:grid;grid-template-columns:1fr 68px;gap:10px;align-items:center;margin-top:12px}.pill{font-size:12px;font-weight:900;background:#dbeafe;color:#1e3a8a;border-radius:999px;padding:7px 9px;text-align:center}input[type=range]{padding:0}.small{font-size:12px;color:#6b7280}
</style></head><body><div class="app"><header class="header"><div class="title">River DEM</div><button class="set" onclick="openSettings()">설정</button></header>
<section class="card" id="start"><h2>DEM 준비</h2><div class="desc">VWorld API Key와 GeoTIFF DEM을 선택합니다.</div><input id="key" placeholder="VWorld API Key"><input type="file" id="demFile" accept=".tif,.tiff"><button onclick="prepare()">DEM 적용</button><div class="log" id="info">DEM 대기 중</div></section>
<section class="card hidden" id="nav"><h2>위치 선택</h2><div class="desc">GPS 또는 하천 선택으로 이동합니다.</div><button class="green" onclick="gps()">현재 위치 확인</button><div class="badge" id="gpsb">GPS 대기</div><select id="river"></select><button onclick="moveRiver()">선택한 하천으로 이동</button></section>
<section class="card hidden" id="mapc"><h2>지도</h2><div class="desc">지도를 터치하면 DEM 고도와 3x3 검증값을 표시합니다.</div><div id="map"></div></section>
<section class="card hidden" id="res"><h2>DEM 결과</h2><div class="grid"><div class="box"><div class="label">DEM 고도</div><div class="value" id="z">-</div></div><div class="box"><div class="label">3x3 평균</div><div class="value" id="avg">-</div></div></div><div class="grid"><div class="box"><div class="label">3x3 최소</div><div class="state" id="mn">-</div></div><div class="box"><div class="label">3x3 최대</div><div class="state" id="mx">-</div></div></div><div class="box"><div class="label">해석</div><div class="state" id="cls">-</div><div class="badge" id="stat">대기</div></div><div class="box"><div class="label">드론 기준</div><div class="state" id="drone">지면 + 100m</div></div><div class="log" id="out">지도 클릭 또는 GPS 위치를 사용하세요.</div></section></div>
<div class="mask" id="mask" onclick="closeSettings()"><div class="drawer" onclick="event.stopPropagation()"><div style="display:flex;justify-content:space-between;align-items:center"><h2>설정</h2><button class="gray" style="width:auto;margin:0" onclick="closeSettings()">닫기</button></div><div class="desc">Heatmap 색상과 투명도를 설정합니다.</div><button onclick="toggleHeat()">Heatmap 켜기 / 끄기</button><div class="rr"><input type="range" id="op" min="10" max="80" value="45" oninput="opText();redraw()"><div class="pill" id="opt">45%</div></div><div id="legend"></div><button class="gray" onclick="selClass('all')">전체 색상 보기</button></div></div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script><script src="https://cdn.jsdelivr.net/npm/geotiff@2.1.3/dist-browser/geotiff.min.js"></script><script src="https://cdnjs.cloudflare.com/ajax/libs/proj4js/2.11.0/proj4.js"></script><script>
proj4.defs("EPSG:5179","+proj=tmerc +lat_0=38 +lon_0=127.5 +k=0.9996 +x_0=1000000 +y_0=2000000 +ellps=GRS80 +units=m +no_defs");
const C=[["a","0~5m","강·수면·저지대",-99999,5,[0,0,255]],["b","5~20m","낮은 지형",5,20,[0,200,255]],["c","20~50m","둔치·평지",20,50,[0,255,0]],["d","50~100m","제방·사면",50,100,[255,255,0]],["e","100m+","산지·고지대",100,999999,[255,0,0]]];
const R=[["섬진강 / 화개",35.186645,127.622747,14],["섬진강 / 순창",35.432,127.385,13],["영산강",35.017,126.744,12],["보성강",35.079,127.374,12],["탐진강",34.642,126.772,12],["한강",37.526,126.934,13],["금강",36.470,127.080,12],["낙동강",35.206,128.954,12],["남강",35.180,128.092,12],["태화강",35.544,129.320,13]];
let map,heat,mark,ras,w=0,h=0,ox=0,oy=0,px=0,py=0,minx=0,maxx=0,miny=0,maxy=0,key="",sc="all";
function init(){key=localStorage.getItem("vworld_key")||"";document.getElementById("key").value=key;R.forEach((r,i)=>{let o=document.createElement("option");o.value=i;o.textContent=r[0];river.appendChild(o)});legend();opText()}init();
function openSettings(){mask.style.display="block"}function closeSettings(){mask.style.display="none"}function opText(){opt.innerText=op.value+"%"}
function legend(){legendDiv=document.getElementById("legend");legendDiv.innerHTML="";let all=document.createElement("div");all.className="ci active";all.id="lg-all";all.onclick=()=>selClass("all");all.innerHTML='<div class="sw" style="background:linear-gradient(135deg,blue,cyan,lime,yellow,red)"></div><div><b>전체</b><div class="small">모든 고도 구간</div></div>';legendDiv.appendChild(all);C.forEach(c=>{let d=document.createElement("div");d.className="ci";d.id="lg-"+c[0];d.onclick=()=>selClass(c[0]);d.innerHTML=`<div class="sw" style="background:rgba(${c[5][0]},${c[5][1]},${c[5][2]},.8)"></div><div><b>${c[1]}</b><div class="small">${c[2]}</div></div>`;legendDiv.appendChild(d)})}
function selClass(id){sc=id;document.querySelectorAll(".ci").forEach(x=>x.classList.remove("active"));document.getElementById("lg-"+id).classList.add("active");redraw()}
async function prepare(){key=document.getElementById("key").value.trim();if(!key)return alert("VWorld API Key 입력");localStorage.setItem("vworld_key",key);let f=demFile.files[0];if(!f)return alert("GeoTIFF 선택");info.innerText="DEM 로드 중...";try{let t=await GeoTIFF.fromArrayBuffer(await f.arrayBuffer());let img=await t.getImage();w=img.getWidth();h=img.getHeight();let tie=img.getTiePoints()[0],s=img.getFileDirectory().ModelPixelScale;ox=tie.x;oy=tie.y;px=s[0];py=-s[1];minx=Math.min(ox,ox+px*w);maxx=Math.max(ox,ox+px*w);miny=Math.min(oy,oy+py*h);maxy=Math.max(oy,oy+py*h);ras=(await img.readRasters({samples:[0]}))[0];info.innerText=`DEM 로드 성공\n크기=${w}x${h}\nX=${minx}~${maxx}\nY=${miny}~${maxy}`;["nav","mapc","res"].forEach(id=>document.getElementById(id).classList.remove("hidden"));moveRiver()}catch(e){info.innerText="DEM 로드 실패: "+e}}
function ensure(c,z){if(!map){map=L.map("map",{zoomControl:false}).setView(c,z);L.tileLayer("https://api.vworld.kr/req/wmts/1.0.0/"+key+"/Base/{z}/{y}/{x}.png",{maxZoom:19,attribution:"VWorld"}).addTo(map);map.on("click",e=>{if(mark)mark.setLatLng(e.latlng);else mark=L.marker(e.latlng).addTo(map);show(e.latlng.lat,e.latlng.lng)})}else map.setView(c,z);setTimeout(()=>map.invalidateSize(),300)}
function moveRiver(){let r=R[parseInt(river.value||"0")];ensure([r[1],r[2]],r[3]);if(mark)mark.setLatLng([r[1],r[2]]);else mark=L.marker([r[1],r[2]]).addTo(map);show(r[1],r[2])}
function gps(){if(!navigator.geolocation)return alert("GPS 미지원");gpsb.innerText="GPS 확인 중";navigator.geolocation.getCurrentPosition(p=>{let lat=p.coords.latitude,lon=p.coords.longitude;gpsb.innerText=`GPS ${lat.toFixed(5)}, ${lon.toFixed(5)}`;ensure([lat,lon],15);if(mark)mark.setLatLng([lat,lon]);else mark=L.marker([lat,lon]).addTo(map);show(lat,lon)},e=>{gpsb.innerText="GPS 실패";alert("GPS 실패: "+e.message)},{enableHighAccuracy:true,timeout:10000,maximumAge:0})}
function val(r,c){if(!ras||r<0||c<0||r>=h||c>=w)return null;let v=Number(ras[r*w+c]);return Number.isFinite(v)?v:null}
function st3(r,c){let a=[];for(let y=r-1;y<=r+1;y++)for(let x=c-1;x<=c+1;x++){let v=val(y,x);if(v!==null)a.push(v)}if(!a.length)return null;return{avg:a.reduce((p,q)=>p+q,0)/a.length,min:Math.min(...a),max:Math.max(...a)}}
function read(lat,lon){let p=proj4("EPSG:4326","EPSG:5179",[lon,lat]),x=p[0],y=p[1];if(x<minx||x>=maxx||y<miny||y>=maxy)return{ok:false,msg:"DEM 범위 밖",x,y};let rr=(oy-y)/Math.abs(py),cc=(x-ox)/px,r=Math.floor(rr),c=Math.floor(cc),zv=val(r,c),s=st3(r,c);if(zv===null||!s)return{ok:false,msg:"픽셀 오류",x,y,r,c};return{ok:true,z:zv,s,x,y,r,c,rr,cc}}
function classify(v){if(v<0)return"저지대 / 하천 인접 가능";if(v<5)return"수면·모래톱·저지대 가능";if(v<30)return"둔치·평지 가능";if(v<80)return"제방·완만한 사면 가능";return"산지·고지대 가능"}
function show(lat,lon){let r=read(lat,lon);if(!r.ok){z.innerText=avg.innerText=mn.innerText=mx.innerText="-";cls.innerText="판정 불가";stat.innerText=r.msg;out.innerText=`상태=${r.msg}\n위도=${lat.toFixed(7)}\n경도=${lon.toFixed(7)}\nX=${r.x?.toFixed(3)}\nY=${r.y?.toFixed(3)}`;return}z.innerText=r.z.toFixed(2)+"m";avg.innerText=r.s.avg.toFixed(2)+"m";mn.innerText=r.s.min.toFixed(2)+"m";mx.innerText=r.s.max.toFixed(2)+"m";cls.innerText=classify(r.z);stat.innerText="DEM 내부";drone.innerText=`지면 + 100m = ${(r.z+100).toFixed(2)}m`;out.innerText=`위도=${lat.toFixed(7)}\n경도=${lon.toFixed(7)}\nX=${r.x.toFixed(3)}\nY=${r.y.toFixed(3)}\nrow=${r.r}\ncol=${r.c}\n단일=${r.z.toFixed(5)}m\n3x3 평균=${r.s.avg.toFixed(5)}m\n3x3 최소=${r.s.min.toFixed(5)}m\n3x3 최대=${r.s.max.toFixed(5)}m`}
function clsH(v){return C.find(c=>v>=c[3]&&v<c[4])||C[C.length-1]}function rgba(v){let c=clsH(v),a=Math.round(parseInt(op.value)/100*255);if(sc==="all"||sc===c[0])return[c[5][0],c[5][1],c[5][2],a];return[180,180,180,35]}
function toggleHeat(){if(!map||!ras)return alert("DEM 먼저 로드");if(heat){map.removeLayer(heat);heat=null;return}drawHeat()}function redraw(){if(heat)drawHeat()}
function drawHeat(){if(heat){map.removeLayer(heat);heat=null}let canvas=document.createElement("canvas");canvas.width=w;canvas.height=h;let ctx=canvas.getContext("2d"),img=ctx.createImageData(w,h);for(let y=0;y<h;y++)for(let x=0;x<w;x++){let i=y*w+x,c=rgba(Number(ras[i])),p=i*4;img.data[p]=c[0];img.data[p+1]=c[1];img.data[p+2]=c[2];img.data[p+3]=c[3]}ctx.putImageData(img,0,0);function to4326(x,y){let p=proj4("EPSG:5179","EPSG:4326",[x,y]);return[p[1],p[0]]}let nw=to4326(minx,maxy),se=to4326(maxx,miny),b=[[se[0],nw[1]],[nw[0],se[1]]];heat=L.imageOverlay(canvas.toDataURL(),b,{opacity:1}).addTo(map);map.fitBounds(b)}
</script></body></html>
